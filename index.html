<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CG サンプルギャラリー | KEWBU.Inc</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* LOCK */
  #lock-screen {
    position: fixed; inset: 0; background: #0f0f0f;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1.1rem; z-index: 200;
  }
  .lock-logo { font-size: 0.72rem; letter-spacing: 0.22em; color: #555; margin-bottom: 0.2rem; }
  .lock-icon { font-size: 2.4rem; opacity: 0.35; }
  .lock-title { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.08em; color: #d0d0d0; }
  .lock-sub { font-size: 0.8rem; color: #777; }
  .pw-row {
    display: flex; border: 1px solid #2e2e2e; border-radius: 6px;
    overflow: hidden; width: 260px; margin-top: 0.3rem;
  }
  #pw-input {
    flex: 1; padding: 10px 14px; background: #1a1a1a;
    border: none; color: #e8e8e8; font-size: 0.88rem; outline: none;
  }
  #pw-input::placeholder { color: #444; }
  #pw-btn {
    padding: 10px 16px; background: #252525; border: none;
    border-left: 1px solid #2e2e2e; color: #bbb; font-size: 0.82rem;
    cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s;
  }
  #pw-btn:hover { background: #333; }
  .pw-err { font-size: 0.76rem; color: #e57373; height: 1em; }
  .expire-notice { font-size: 0.7rem; color: #484848; margin-top: 0.5rem; }

  /* GALLERY */
  #gallery-screen { display: none; flex-direction: column; min-height: 100vh; }

  .g-header {
    padding: 12px 24px; border-bottom: 1px solid #1e1e1e; background: #111;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .g-header-left { display: flex; flex-direction: column; gap: 2px; }
  .g-company { font-size: 0.65rem; letter-spacing: 0.18em; color: #c8a060; }
  .g-title { font-size: 0.88rem; font-weight: 600; letter-spacing: 0.07em; color: #d0d0d0; }
  .g-badge {
    font-size: 0.68rem; background: #1e1800; color: #c8a060;
    border: 1px solid #3a2e10; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.04em;
  }

  /* VIEWER */
  .viewer-wrap {
    flex: 1; background: #080808; display: flex; align-items: center; justify-content: center;
    position: relative; min-height: calc(100vh - 180px);
    user-select: none; -webkit-user-select: none; overflow: hidden;
  }
  #main-canvas {
    max-width: 100%; max-height: calc(100vh - 200px);
    object-fit: contain; display: block;
    transition: opacity 0.2s; pointer-events: none;
  }
  .watermark {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 800;
    color: rgba(255,255,255,0.09); letter-spacing: 0.2em; transform: rotate(-25deg); z-index: 5;
  }
  .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
    color: #bbb; font-size: 1.4rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; transition: background 0.15s; line-height: 1;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.12); }
  .nav-btn.left { left: 14px; }
  .nav-btn.right { right: 14px; }

  .loading-msg {
    position: absolute; color: #555; font-size: 0.82rem; letter-spacing: 0.06em;
  }

  /* THUMBNAILS */
  .thumbs-row {
    display: flex; gap: 7px; padding: 9px 14px; background: #111;
    border-top: 1px solid #1e1e1e; overflow-x: auto; justify-content: center;
  }
  .thumb {
    width: 76px; height: 54px; border-radius: 4px; overflow: hidden;
    cursor: pointer; border: 2px solid transparent; flex-shrink: 0;
    background: #1e1e1e; transition: border-color 0.15s, opacity 0.15s; opacity: 0.5;
    display: flex; align-items: center; justify-content: center;
  }
  .thumb canvas { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .thumb.active { border-color: #c8a060; opacity: 1; }
  .thumb:hover { opacity: 0.8; }

  /* FOOTER */
  .g-footer {
    padding: 8px 20px; border-top: 1px solid #1a1a1a; background: #0a0a0a;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  }
  .page-info { font-size: 0.76rem; color: #555; }
  .footer-right { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .footer-link {
    font-size: 0.73rem; color: #666; text-decoration: none;
    letter-spacing: 0.03em; transition: color 0.15s;
  }
  .footer-link:hover { color: #c8a060; }
  .footer-sep { color: #333; font-size: 0.7rem; }
  .footer-note { font-size: 0.68rem; color: #383838; letter-spacing: 0.04em; }

  img { -webkit-user-drag: none; }

  @media (max-width: 600px) {
    .nav-btn { width: 34px; height: 34px; font-size: 1rem; }
    .thumb { width: 58px; height: 42px; }
  }
</style>
</head>
<body>

<!-- ロック画面 -->
<div id="lock-screen">
  <div class="lock-logo">KEWBU.Inc</div>
  <div class="lock-icon">🔒</div>
  <div class="lock-title">CG サンプルギャラリー</div>
  <div class="lock-sub">パスワードを入力してください</div>
  <div class="pw-row">
    <input type="password" id="pw-input" placeholder="パスワード" autocomplete="off"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button id="pw-btn" onclick="checkPw()">入室</button>
  </div>
  <div class="pw-err" id="pw-err"></div>
  <div class="expire-notice">※ 閲覧期限：2026年7月9日まで</div>
</div>

<!-- ギャラリー画面 -->
<div id="gallery-screen">
  <div class="g-header">
    <div class="g-header-left">
      <span class="g-company">KEWBU.Inc</span>
      <span class="g-title">CG SAMPLE GALLERY</span>
    </div>
    <span class="g-badge">閲覧期限 2026.7.9 まで</span>
  </div>

  <div class="viewer-wrap" oncontextmenu="return false">
    <button class="nav-btn left" onclick="move(-1)" aria-label="前の画像">&#8249;</button>
    <canvas id="main-canvas"></canvas>
    <span class="loading-msg" id="loading-msg">読み込み中...</span>
    <div class="watermark">SAMPLE</div>
    <button class="nav-btn right" onclick="move(1)" aria-label="次の画像">&#8250;</button>
  </div>

  <div class="thumbs-row" id="thumbs"></div>

  <div class="g-footer">
    <span class="page-info" id="page-info">1 / 5</span>
    <div class="footer-right">
      <a class="footer-link" href="https://www.kewbu.com/#works-gallery" target="_blank">🌐 KEWBU.Inc 公式ギャラリー</a>
      <span class="footer-sep">|</span>
      <a class="footer-link" href="tel:08041856788">📞 080-4185-6788</a>
      <span class="footer-sep">|</span>
      <a class="footer-link" href="mailto:ken714@kewbu.com">✉ ken714@kewbu.com</a>
      <span class="footer-sep">|</span>
      <span class="footer-note">無断転用禁止</span>
    </div>
  </div>
</div>

<script>
  const PASSWORD = "cg2026";
  const EXPIRE   = new Date("2026-07-09T23:59:59+09:00");
  const PDF_URL  = "260626_sample.pdf";
  const TOTAL    = 5;

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  let pdfDoc  = null;
  let current = 0;
  let rendering = false;

  function checkPw() {
    const val = document.getElementById("pw-input").value;
    const err = document.getElementById("pw-err");
    if (new Date() > EXPIRE) { err.textContent = "閲覧期限が終了しました。"; return; }
    if (val === PASSWORD) {
      document.getElementById("lock-screen").style.display = "none";
      const gs = document.getElementById("gallery-screen");
      gs.style.display = "flex";
      loadPdf();
    } else {
      err.textContent = "パスワードが正しくありません。";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }

  function loadPdf() {
    pdfjsLib.getDocument(PDF_URL).promise.then(pdf => {
      pdfDoc = pdf;
      document.getElementById("loading-msg").style.display = "none";
      buildThumbs();
      renderMain(1);
    }).catch(e => {
      document.getElementById("loading-msg").textContent = "読み込みエラー: " + e.message;
    });
  }

  function renderMain(pageNum) {
    if (!pdfDoc || rendering) return;
    rendering = true;
    const canvas = document.getElementById("main-canvas");
    canvas.style.opacity = "0";
    pdfDoc.getPage(pageNum).then(page => {
      const vw = canvas.parentElement.clientWidth - 100;
      const vh = canvas.parentElement.clientHeight - 20;
      const vp0 = page.getViewport({ scale: 1 });
      const scale = Math.min(vw / vp0.width, vh / vp0.height, 2.0);
      const vp = page.getViewport({ scale });
      canvas.width  = vp.width;
      canvas.height = vp.height;
      page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise.then(() => {
        canvas.style.opacity = "1";
        rendering = false;
      });
    });
  }

  function buildThumbs() {
    const el = document.getElementById("thumbs");
    for (let i = 0; i < TOTAL; i++) {
      const wrap = document.createElement("div");
      wrap.className = "thumb" + (i === 0 ? " active" : "");
      wrap.id = "thumb-" + i;
      wrap.onclick = () => goTo(i);
      const c = document.createElement("canvas");
      wrap.appendChild(c);
      el.appendChild(wrap);
      renderThumb(i + 1, c);
    }
  }

  function renderThumb(pageNum, canvas) {
    pdfDoc.getPage(pageNum).then(page => {
      const vp0 = page.getViewport({ scale: 1 });
      const scale = 76 / vp0.width;
      const vp = page.getViewport({ scale });
      canvas.width  = vp.width;
      canvas.height = vp.height;
      page.render({ canvasContext: canvas.getContext("2d"), viewport: vp });
    });
  }

  function goTo(idx) {
    current = ((idx % TOTAL) + TOTAL) % TOTAL;
    document.getElementById("page-info").textContent = `${current + 1} / ${TOTAL}`;
    document.querySelectorAll(".thumb").forEach((t, i) => {
      t.className = "thumb" + (i === current ? " active" : "");
    });
    rendering = false;
    renderMain(current + 1);
  }

  function move(dir) { goTo(current + dir); }

  document.addEventListener("keydown", e => {
    if (document.getElementById("gallery-screen").style.display === "flex") {
      if (e.key === "ArrowRight") move(1);
      if (e.key === "ArrowLeft")  move(-1);
    }
  });
  document.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("dragstart",   e => e.preventDefault());
</script>
</body>
</html>
